<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卒業研究発表会 管理ページ</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #f4f6f9;
    --card:        #ffffff;
    --primary:     #2563eb;
    --primary-h:   #1d4ed8;
    --danger:      #dc2626;
    --danger-h:    #b91c1c;
    --success:     #16a34a;
    --border:      #e2e8f0;
    --text:        #1e293b;
    --muted:       #64748b;
    --radius:      10px;
  }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  /* ── ページヘッダー ── */
  .page-header {
    max-width: 1100px;
    margin: 0 auto 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: .75rem;
  }
  .page-header h1 { font-size: 1.4rem; font-weight: 700; }
  .page-header a  {
    font-size: .85rem;
    color: var(--primary);
    text-decoration: none;
    padding: .4rem .9rem;
    border: 1px solid var(--primary);
    border-radius: 6px;
    transition: background .15s;
  }
  .page-header a:hover { background: var(--primary); color: #fff; }

  /* ── カード ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    max-width: 1100px;
    margin: 0 auto 2rem;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .card h2 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1.2rem;
    padding-bottom: .6rem;
    border-bottom: 2px solid var(--primary);
    color: var(--primary);
  }

  /* ── フォーム ── */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
  }
  .form-group        { display: flex; flex-direction: column; gap: .35rem; }
  .form-group.full   { grid-column: 1 / -1; }

  label          { font-size: .82rem; font-weight: 600; color: var(--muted); }
  label .req     { color: var(--danger); margin-left: 2px; }

  input, select {
    padding: .5rem .75rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: .92rem;
    font-family: inherit;
    background: #fff;
    width: 100%;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37,99,235,.12);
  }
  input[readonly] { background: #f1f5f9; color: var(--muted); cursor: not-allowed; }

  .btn-row { display: flex; gap: .75rem; flex-wrap: wrap; margin-top: 1.2rem; }

  button {
    padding: .55rem 1.4rem;
    border: none;
    border-radius: 6px;
    font-size: .9rem;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  button:active { transform: scale(.97); }

  .btn-primary   { background: var(--primary); color: #fff; }
  .btn-primary:hover   { background: var(--primary-h); }
  .btn-secondary { background: #e2e8f0; color: var(--text); }
  .btn-secondary:hover { background: #cbd5e1; }

  /* ── 件数バー ── */
  .count-bar {
    font-size: .85rem;
    color: var(--muted);
    margin-bottom: .75rem;
    text-align: right;
  }

  /* ── テーブル ── */
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  thead th {
    background: #f1f5f9;
    padding: .7rem .9rem;
    text-align: left;
    font-weight: 700;
    border-bottom: 2px solid var(--border);
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; }
  tbody td { padding: .65rem .9rem; vertical-align: middle; }
  tbody td a { color: var(--primary); }

  .act-btn {
    padding: .28rem .7rem;
    font-size: .8rem;
    border-radius: 5px;
    margin-right: .3rem;
    cursor: pointer;
    border: 1px solid transparent;
    font-weight: 600;
    transition: background .12s;
  }
  .btn-edit   { background: #fef9c3; color: #854d0e; border-color: #fde047; }
  .btn-edit:hover   { background: #fde047; }
  .btn-delete { background: #fee2e2; color: var(--danger); border-color: #fca5a5; }
  .btn-delete:hover { background: #fca5a5; }

  /* ── トースト ── */
  #toast {
    position: fixed;
    top: 1.2rem; right: 1.2rem;
    padding: .75rem 1.2rem;
    border-radius: 8px;
    font-size: .9rem;
    font-weight: 600;
    color: #fff;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
    z-index: 9999;
    max-width: 300px;
  }
  #toast.show    { opacity: 1; }
  #toast.success { background: var(--success); }
  #toast.error   { background: var(--danger); }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>📋 卒業研究発表会 管理ページ</h1>
  <a href="infomation.html">← 一覧ページへ戻る</a>
</div>

<!-- ── 入力フォーム ─────────────────────────────────── -->
<div class="card">
  <h2 id="formTitle">➕ 新規登録</h2>
  <div class="form-grid">

    <div class="form-group">
      <label for="f_date">日付 <span class="req">*</span></label>
      <input type="date" id="f_date">
    </div>

    <div class="form-group">
      <label>時間 <span class="req">*</span></label>
      <select id="f_time">
        <option value="">選択してください</option>
        <option value="1">1限</option>
        <option value="2">2限</option>
        <option value="3">3限</option>
        <option value="4">4限</option>
        <option value="5">5限</option>
        <option value="6">6限</option>
      </select>
    </div>

    <div class="form-group">
      <label>クラス <span class="req">*</span></label>
      <select id="f_class">
        <option value="">選択してください</option>
      </select>
    </div>

    <div class="form-group full">
      <label for="f_title">タイトル <span class="req">*</span></label>
      <input type="text" id="f_title" placeholder="研究タイトルを入力">
    </div>

    <div class="form-group full">
      <label for="f_link">HP リンク URL <span class="req">*</span></label>
      <input type="text" id="f_link" placeholder="https://example.com または home.html など">
    </div>

    <div class="form-group full">
      <label for="f_linktitle">リンク表示名（省略時はタイトルを使用）</label>
      <input type="text" id="f_linktitle" placeholder="例: ちはるんの卒研紹介ぺーじ♡">
    </div>

  </div>
  <div class="btn-row">
    <button class="btn-primary" id="btnSubmit" onclick="submitForm()">登録する</button>
    <button class="btn-secondary" onclick="resetForm()">クリア</button>
  </div>
</div>

<!-- ── 登録済み一覧 ────────────────────────────────── -->
<div class="card">
  <h2>📄 登録済み一覧</h2>
  <div class="count-bar">全 <strong id="listCount">0</strong> 件</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>日付</th>
          <th>時間</th>
          <th>クラス</th>
          <th>タイトル</th>
          <th>リンク</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="listBody"></tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

<script>
  // ─── APIパス（html/ からの相対パス）──────────────────
  const API_MEMBERS = '../php/get_members.php';
  const API_CLASS   = '../php/get_class.php';
  const API_SAVE    = '../php/save_member.php';

  let allData  = [];
  let editMode = false;   // false = 新規登録, true = 編集中
  let editNo   = null;

  const TIME_LABEL = {
    '1':'1限','2':'2限','3':'3限','4':'4限','5':'5限','6':'6限'
  };

  // ─── クラスプルダウン読み込み ─────────────────────────
  async function loadClasses() {
    try {
      const res  = await fetch(API_CLASS);
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      const sel = document.getElementById('f_class');
      json.data.forEach(c => {
        const opt = document.createElement('option');
        opt.value       = c.class_code;
        opt.textContent = `${c.class_code}：${c.class_name}`;
        sel.appendChild(opt);
      });
    } catch (e) {
      showToast('クラス一覧の取得に失敗しました: ' + e.message, 'error');
    }
  }

  // ─── 一覧取得 ──────────────────────────────────────────
  async function loadList() {
    try {
      const res  = await fetch(API_MEMBERS);
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      allData = json.data;
      renderList(allData);
    } catch (e) {
      showToast('データ取得エラー: ' + e.message, 'error');
    }
  }

  function renderList(data) {
    document.getElementById('listCount').textContent = data.length;
    const tbody = document.getElementById('listBody');

    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:1.5rem;color:#888;">データがありません</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(row => `
      <tr>
        <td>${row.No}</td>
        <td>${formatDate(row.date)}</td>
        <td>${TIME_LABEL[row.time] ?? row.time}</td>
        <td>${esc(row.class_name ?? row.class_code)}</td>
        <td>${esc(row.title)}</td>
        <td>
          ${row.HP_link
            ? `<a href="${esc(row.HP_link)}" target="_blank" rel="noopener">${esc(row.link_title || row.HP_link)}</a>`
            : '—'}
        </td>
        <td>
          <button class="act-btn btn-edit"   onclick="startEdit(${row.No})">編集</button>
          <button class="act-btn btn-delete" onclick="deleteRow(${row.No})">削除</button>
        </td>
      </tr>
    `).join('');
  }

  // ─── 登録 / 更新 ───────────────────────────────────────
  async function submitForm() {
    const body = {
      date:       document.getElementById('f_date').value,
      time:       document.getElementById('f_time').value,
      class_code: document.getElementById('f_class').value,
      title:      document.getElementById('f_title').value.trim(),
      HP_link:    document.getElementById('f_link').value.trim(),
      link_title: document.getElementById('f_linktitle').value.trim(),
    };

    // バリデーション
    const labels = { date:'日付', time:'時間', class_code:'クラス', title:'タイトル', HP_link:'HPリンク' };
    for (const [key, label] of Object.entries(labels)) {
      if (!body[key]) { showToast(`「${label}」を入力してください`, 'error'); return; }
    }

    if (editMode) body.No = editNo;

    const method = editMode ? 'PUT' : 'POST';
    try {
      const res  = await fetch(API_SAVE, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      showToast(json.message, 'success');
      resetForm();
      loadList();
    } catch (e) {
      showToast('エラー: ' + e.message, 'error');
    }
  }

  // ─── 編集モード ────────────────────────────────────────
  function startEdit(no) {
    const row = allData.find(r => r.No == no);
    if (!row) return;

    editMode = true;
    editNo   = no;

    document.getElementById('formTitle').textContent = `✏️ 編集中（No.${no}）`;
    document.getElementById('btnSubmit').textContent = '更新する';
    document.getElementById('f_date').value          = row.date;
    document.getElementById('f_time').value          = row.time;
    document.getElementById('f_class').value         = row.class_code;
    document.getElementById('f_title').value         = row.title;
    document.getElementById('f_link').value          = row.HP_link;
    document.getElementById('f_linktitle').value     = row.link_title ?? '';

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ─── 削除 ──────────────────────────────────────────────
  async function deleteRow(no) {
    if (!confirm(`No.${no} を削除してよいですか？`)) return;
    try {
      const res  = await fetch(API_SAVE, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ No: no }),
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      showToast(json.message, 'success');
      loadList();
    } catch (e) {
      showToast('削除エラー: ' + e.message, 'error');
    }
  }

  // ─── フォームリセット ──────────────────────────────────
  function resetForm() {
    editMode = false;
    editNo   = null;
    document.getElementById('formTitle').textContent = '➕ 新規登録';
    document.getElementById('btnSubmit').textContent = '登録する';
    ['f_date','f_title','f_link','f_linktitle'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f_time').value  = '';
    document.getElementById('f_class').value = '';
  }

  // ─── ユーティリティ ────────────────────────────────────
  function formatDate(d) {
    const dt = new Date(d);
    return `${dt.getMonth()+1}/${dt.getDate()}`;
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  let toastTimer;
  function showToast(msg, type = 'success') {
    const el   = document.getElementById('toast');
    el.textContent = msg;
    el.className   = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3500);
  }

  // ─── 初期化 ────────────────────────────────────────────
  loadClasses();
  loadList();
</script>
</body>
</html>
