                    <tr>

                        <th class="border" style="width: 15%;">名前</th>
                        <th class="border" style="width: 31%;">E-Mail</th>
                        <th class="border" style="width: 31%;">リンク</th>
                        <th id="vote">投票先</th>
                    </tr>
                </thead>
                
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>
<script src="../js/vote.js" defer></script>

</html>
