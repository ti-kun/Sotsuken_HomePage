<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>投票サイト 管理ページ</title>

<link rel="stylesheet" href="../css/vote_admin.scss">
</head>

<body>
    <div class="container">
        <div class="page-header">
            <h1>📋 投票サイト 管理ページ</h1>
            <a href="infomation.html" class="back-btn">
                ← 一覧ページへ戻る
            </a>
        </div>

        <div class="card">
            <h2>➕ 学生データ追加</h2>

            <form id="student-form">

            <div class="form-group">
                <label for="student-no">学籍番号</label>
                <input
                type="number"
                name="No"
                id="student-no"
                placeholder="学籍番号"
                required
                >
            </div>

            <div class="form-group">
                <label for="name">名前</label>
                <input
                type="text"
                name="Name"
                id="name"
                placeholder="名前"
                required
                >
            </div>

            <div class="form-group">
                <label for="mail">メール</label>
                <input
                type="email"
                name="Mail"
                id="mail"
                placeholder="メールアドレス"
                >
            </div>

            <div class="form-group">
                <label for="link">リンク</label>
                <input
                type="text"
                name="Link"
                id="link"
                placeholder="HPリンク"
                >
            </div>

            <div class="btn-row">
                <button
                    type="button"
                    class="btn-primary"
                    id="submit-btn"
                    onclick="saveStudent()"
                >
                    追加
                </button>

                <button
                    type="reset"
                    class="btn-secondary"
                    onclick="resetForm()"
                >
                    クリア
                </button>
            </div>
            </form>
        </div>

        <div class="card">
            <h2>📄 登録済み一覧</h2>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>学籍番号</th>
                            <th>名前</th>
                            <th>メール</th>
                            <th>リンク</th>
                            <th>操作</th>
                        </tr>
                    </thead>

                    <tbody id="student-list">
                        <!-- JSで生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<script src="../js/vote_admin.js" defer></script>

</body>
</html>
